{% extends "layout/main_layout.html" %}
{% block 'content' %}
{% load crispy_forms_tags %}

<h2>Реєстрація</h2>
<form method="POST" action="{% url 'register' %}">
    {% csrf_token %}
    {{ form|crispy }}
    <input type="submit" value="Зареєструватися" class="btn btn-primary">
    <p style="margin-top: 10px;">Вже є акаунт? <a href="{% url 'login' %}">Увійти</a></p>
</form>

{% endblock %}
