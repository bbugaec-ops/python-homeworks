<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Академія — Головна</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; margin: 0; padding: 2rem; background: #f5f5f5; }
        main { max-width: 780px; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        h1 { margin-top: 0; color: #1a1a1a; }
        p { color: #444; line-height: 1.6; }
        a { color: #0d6efd; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .links { margin-top: 1.5rem; }
        .links a { display: inline-block; margin-right: 1rem; }
    </style>
</head>
<body>
    <main>
        <h1>Академія</h1>
        <p>Ласкаво просимо до системи управління навчальною академією. Тут ви можете керувати викладачами, курсами та студентами.</p>
        <div class="links">
            <a href="{% url 'teacher_list' %}">Викладачі</a>
            <a href="{% url 'course_list' %}">Курси</a>
            <a href="{% url 'student_list' %}">Студенти</a>
            <a href="{% url 'admin:index' %}">Адмін-панель</a>
        </div>
    </main>
</body>
</html>
